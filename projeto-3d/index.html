<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra Mariára — Maquete Isométrica</title>
<style>
:root{
  --coral:#d98a6f; --paper:#f6f2ec; --stone:#8d8579;
  --green:#22c97e; --amber:#f59e0b; --blue:#3b82f6;
  --bg:#171411; --panel:#100e0c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Courier New',monospace;display:flex;height:100vh;overflow:hidden;}

/* PAINEL */
#panel{width:270px;min-width:270px;background:var(--panel);
  border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;}
#ph{padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.06);}
#ph .t1{color:var(--coral);font-size:13px;font-weight:bold;letter-spacing:.06em;}
#ph .t2{color:rgba(255,255,255,.35);font-size:9px;margin-top:3px;}
.stats{padding:10px 15px;border-bottom:1px solid rgba(255,255,255,.06);
  display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.stat .k{font-size:8px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;}
.stat .v{font-size:13px;color:var(--coral);font-weight:bold;margin-top:1px;}
#tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);}
.tab{flex:1;padding:8px 3px;font-size:10px;font-family:inherit;background:none;border:none;
  color:rgba(255,255,255,.32);cursor:pointer;transition:.15s;letter-spacing:.03em;}
.tab.on{background:rgba(217,138,111,.1);color:var(--coral);}
#pb{flex:1;overflow-y:auto;padding:9px 11px;}
#pb::-webkit-scrollbar{width:3px;}
#pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}
.card{margin-bottom:7px;padding:8px 10px;background:rgba(255,255,255,.025);
  border-radius:5px;border-left:3px solid var(--stone);}
.cn{font-size:11px;font-weight:bold;color:var(--paper);}
.ca{font-size:9px;color:var(--stone);margin:2px 0 5px;}
.bg{height:4px;background:rgba(255,255,255,.07);border-radius:2px;}
.bf{height:100%;border-radius:2px;transition:width .5s;}
.pp{text-align:right;font-size:9px;color:var(--stone);margin-top:2px;}

/* VIEW */
#view{flex:1;display:flex;flex-direction:column;min-width:0;}
#toolbar{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.04);}
.btn{padding:5px 12px;font-family:inherit;font-size:10px;letter-spacing:.04em;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--paper);border-radius:4px;cursor:pointer;transition:.15s;}
.btn:hover,.btn.on{background:rgba(217,138,111,.18);border-color:var(--coral);color:var(--coral);}
.sep{width:1px;height:16px;background:rgba(255,255,255,.1);margin:0 3px;}
#svgwrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:14px;}
svg{max-width:100%;max-height:100%;}
#leg{padding:8px 12px;display:flex;gap:12px;flex-wrap:wrap;
  background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.04);}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(255,255,255,.45);}
.ld{width:10px;height:10px;border-radius:2px;}

@media(max-width:720px){
  body{flex-direction:column;}
  #panel{width:100%;min-width:0;height:44%;order:2;border-right:none;border-top:1px solid rgba(255,255,255,.06);}
  #view{height:56%;order:1;}
}
</style>
</head>
<body>

<div id="panel">
  <div id="ph">
    <div class="t1">OBRA MARIÁRA · MAQUETE</div>
    <div class="t2">Av. Amaro Ribeiro Gomes, 236 · Campos/RJ</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="k">PLS acum.</div><div class="v">25,35%</div></div>
    <div class="stat"><div class="k">Liberado</div><div class="v">R$ 30,6k</div></div>
    <div class="stat"><div class="k">2ª med. est.</div><div class="v">R$ 63,7k</div></div>
    <div class="stat"><div class="k">Saldo</div><div class="v">R$ 342k</div></div>
  </div>
  <div id="tabs">
    <button class="tab on" data-t="comodos" onclick="showTab('comodos')">Cômodos</button>
    <button class="tab" data-t="etapas" onclick="showTab('etapas')">Etapas</button>
    <button class="tab" data-t="medicoes" onclick="showTab('medicoes')">Medições</button>
  </div>
  <div id="pb"></div>
</div>

<div id="view">
  <div id="toolbar">
    <button class="btn on" data-f="terreo" onclick="setFloor('terreo')">Térreo</button>
    <button class="btn" data-f="pav1" onclick="setFloor('pav1')">1º Pav.</button>
    <button class="btn" data-f="pav2" onclick="setFloor('pav2')">2º Pav.</button>
    <button class="btn" data-f="empilhado" onclick="setFloor('empilhado')">Empilhado</button>
    <div class="sep"></div>
    <button class="btn on" data-v="se" onclick="setCam('se')">Vista SE</button>
    <button class="btn" data-v="sw" onclick="setCam('sw')">Vista SW</button>
    <button class="btn" data-v="topo" onclick="setCam('topo')">Planta</button>
  </div>
  <div id="svgwrap"><svg id="iso" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div id="leg">
    <div class="li"><div class="ld" style="background:#22c97e"></div>Concluído (100%)</div>
    <div class="li"><div class="ld" style="background:#f59e0b"></div>Em andamento (≥35%)</div>
    <div class="li"><div class="ld" style="background:#3b82f6"></div>Parcial (<35%)</div>
    <div class="li"><div class="ld" style="background:#3a352f"></div>Não iniciado</div>
    <div class="li"><div class="ld" style="background:transparent;border:1px dashed rgba(255,255,255,.35)"></div>A construir (fantasma)</div>
  </div>
</div>

<script>
'use strict';
// ═══ DADOS DA PLANTA (cotas reais, metros) ═══════════════════════
// Coordenadas: x=leste, z=norte (z=0 é a frente/sul), y=altura
const WALL_H = 2.80;

const FLOORS = {
  terreo: {
    label:'Térreo · 89m²', ext:{w:8.70, d:10.95},
    rooms: [
      // id, nome, área, x, z, w, d, exec%
      ['garagem','Garagem',      18.00, 0.00, 0.00, 4.00, 4.50, 40],
      ['sala',   'Sala',         29.60, 4.15, 0.00, 4.55, 6.50, 40],
      ['lavabo', 'Lavabo',        2.16, 0.00, 4.65, 2.40, 0.90,  0],
      ['circ',   'Circulação',    2.50, 2.40, 4.65, 1.60, 0.90,  0],
      ['cozinha','Cozinha',      14.00, 0.00, 5.70, 4.00, 3.50, 35],
      ['quarto', 'Quarto',       11.74, 4.15, 6.65, 4.55, 2.58, 35],
      ['despen', 'Despensa',      1.76, 0.00, 9.20, 1.35, 1.30, 35],
      ['sbanh',  'Suíte (banh.)', 2.88, 1.50, 9.20, 1.65, 1.75, 35],
    ]
  },
  pav1: {
    label:'1º Pavimento · 65m² — A contratar', ext:{w:8.70, d:10.45},
    rooms: [
      ['master','Quarto Master',   16.17, 0.00, 0.00, 4.00, 4.04, 0],
      ['q1',    'Quarto 1',        17.40, 4.15, 0.00, 4.55, 3.82, 0],
      ['q2',    'Quarto 2',        19.79, 0.00, 4.19, 4.00, 4.95, 0],
      ['circ1', 'Circulação',       9.12, 4.15, 4.04, 4.55, 2.11, 0],
      ['cl1',   'Closet 1',         4.00, 4.15, 6.30, 2.00, 2.00, 0],
      ['cl2',   'Closet 2',         4.88, 6.30, 6.30, 2.40, 2.03, 0],
      ['banh1', 'Banheiro',         3.65, 4.15, 8.50, 2.20, 1.66, 0],
      ['sbanh1','Suíte (banh.)',    3.71, 0.00, 9.30, 4.00, 0.93, 0],
      ['varan', 'Varanda coberta',  9.14, 4.15, 9.40, 4.55, 1.05, 0],
    ]
  },
  pav2: {
    label:'2º Pavimento · 46m² — A contratar', ext:{w:8.70, d:7.79},
    rooms: [
      ['area2','Área social',     28.85, 0.00, 0.00, 8.70, 3.32, 0],
      ['var2', 'Varanda descob.', 37.85, 0.00, 3.47, 8.70, 4.32, 0],
    ]
  }
};

// ═══ PROJEÇÃO ISOMÉTRICA ═════════════════════════════════════════
const COS30 = Math.cos(Math.PI/6), SIN30 = 0.5;
let SCALE = 30;
let camMode = 'se';   // 'se' | 'sw' | 'topo'
let floorMode = 'terreo';

function proj(x, y, z) {
  if (camMode === 'topo') {
    return [x * SCALE, z * SCALE];
  }
  // Vista SE: padrão. Vista SW: espelha x
  const px = camMode === 'sw' ? -x : x;
  return [
    (px - z) * COS30 * SCALE,
    (px + z) * SIN30 * SCALE - y * SCALE
  ];
}

function poly(points) {
  return points.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
}

// ═══ CORES ═══════════════════════════════════════════════════════
function roomFill(exec) {
  if (exec >= 100) return {top:'#28d488', side1:'#1fa96c', side2:'#178552'};
  if (exec >= 35)  return {top:'#f8ab2e', side1:'#d98f18', side2:'#b57713'};
  if (exec > 0)    return {top:'#4b93f7', side1:'#3a78d1', side2:'#2c5ea6'};
  return {top:'#413b33', side1:'#36312a', side2:'#2c2822'};
}
function statusOf(exec) {
  if (exec >= 100) return ['concluido','#22c97e','✅ Concluído'];
  if (exec >= 35)  return ['andamento','#f59e0b','🔨 Em andamento'];
  if (exec > 0)    return ['parcial','#3b82f6','⚡ Parcial'];
  return ['pendente','#6b7280','⏳ Não iniciado'];
}

// ═══ DESENHO DE UMA CAIXA ISOMÉTRICA ═════════════════════════════
// Retorna SVG string. Base em (x, z), largura w, profundidade d,
// da altura y0 até y1.
function drawBox(x, z, w, d, y0, y1, colors, opts = {}) {
  const {ghost=false, stroke=null, strokeW=1} = opts;
  const A = proj(x,   y1, z);     // topo NW... depende da vista
  const B = proj(x+w, y1, z);
  const C = proj(x+w, y1, z+d);
  const D = proj(x,   y1, z+d);
  const A0= proj(x,   y0, z);
  const B0= proj(x+w, y0, z);
  const C0= proj(x+w, y0, z+d);
  const D0= proj(x,   y0, z+d);

  let svg = '';
  const fillOp = ghost ? 0.06 : 1;
  const strokeCol = stroke || (ghost ? 'rgba(255,255,255,0.28)' : 'rgba(0,0,0,0.35)');
  const dash = ghost ? 'stroke-dasharray="4,3"' : '';

  if (camMode === 'topo') {
    // Vista de topo: só o retângulo
    svg += `<polygon points="${poly([A,B,C,D])}" fill="${colors.top}" fill-opacity="${fillOp}" stroke="${strokeCol}" stroke-width="${strokeW}" ${dash}/>`;
    return svg;
  }

  // Faces visíveis (vista SE): topo, frente (sul, z), lado leste (x+w)
  // Vista SW: topo, frente (sul), lado oeste (x)
  // topo
  svg += `<polygon points="${poly([A,B,C,D])}" fill="${colors.top}" fill-opacity="${fillOp}" stroke="${strokeCol}" stroke-width="${strokeW}" ${dash}/>`;
  // frente (sul, face em z) — sempre visível nas duas vistas
  svg += `<polygon points="${poly([A0,B0,B,A])}" fill="${colors.side1}" fill-opacity="${fillOp}" stroke="${strokeCol}" stroke-width="${strokeW}" ${dash}/>`;
  // lateral visível
  if (camMode === 'se') {
    svg += `<polygon points="${poly([B0,C0,C,B])}" fill="${colors.side2}" fill-opacity="${fillOp}" stroke="${strokeCol}" stroke-width="${strokeW}" ${dash}/>`;
  } else {
    svg += `<polygon points="${poly([A0,D0,D,A])}" fill="${colors.side2}" fill-opacity="${fillOp}" stroke="${strokeCol}" stroke-width="${strokeW}" ${dash}/>`;
  }
  return svg;
}

function drawLabel(x, z, w, d, y, text, sub, color) {
  const c = proj(x + w/2, y, z + d/2);
  return `<g>
    <text x="${c[0]}" y="${c[1]-8}" text-anchor="middle" font-family="Courier New" font-size="11" font-weight="bold" fill="#f6f2ec" stroke="#100e0c" stroke-width="3" paint-order="stroke">${text}</text>
    <text x="${c[0]}" y="${c[1]+5}" text-anchor="middle" font-family="Courier New" font-size="9" fill="${color}" stroke="#100e0c" stroke-width="2.5" paint-order="stroke">${sub}</text>
  </g>`;
}

// ═══ CENA ════════════════════════════════════════════════════════
function render() {
  const svg = document.getElementById('iso');
  let content = '';
  let allPts = [];

  const floorsToDraw = floorMode === 'empilhado'
    ? [['terreo',0],['pav1',WALL_H+0.15],['pav2',(WALL_H+0.15)*2]]
    : [[floorMode,0]];

  floorsToDraw.forEach(([fid, yOff]) => {
    const fl = FLOORS[fid];
    const isGhostFloor = (fid !== 'terreo');

    // Laje/base do pavimento
    content += drawBox(-0.15, -0.15, fl.ext.w+0.3, fl.ext.d+0.3, yOff-0.18, yOff,
      {top:'#5c564d', side1:'#4a453d', side2:'#3b372f'},
      {ghost: isGhostFloor && floorMode==='empilhado'});

    // Ordenar cômodos: pintor (de trás para frente)
    // Vista SE: atrás = maior z, menor x → ordenar por (z+d) desc, depois x asc... 
    // Chave robusta: -(x + z + w + d) para SE ; para SW: -( (extW - x - w) + z ...)
    const sorted = [...fl.rooms].sort((a, b) => {
      const depthA = camMode==='sw' ? (fl.ext.w-a[3]-a[5]) + a[4] : a[3] + a[4];
      const depthB = camMode==='sw' ? (fl.ext.w-b[3]-b[5]) + b[4] : b[3] + b[4];
      return depthB + (camMode==='topo'?0:0) - depthA;
    });
    // Para o pintor correto na isométrica SE: desenhar primeiro os de MAIOR (z) e MAIOR (x)?
    // Regra validada: quem está mais "atrás" na tela tem maior (x+z) na vista SE... 
    // Na proj SE, y_tela cresce com (x+z). Objetos com MENOR y_tela (topo da tela) ficam atrás.
    // → desenhar por (x+z) ascendente = de trás (menor x+z... não!)
    // proj: iy = (x+z)*sin30 - y  → MENOR (x+z) = mais ALTO na tela = mais atrás
    // → desenhar primeiro quem tem MENOR (x+z + w+d como desempate)
    sorted.sort((a,b) => {
      const ka = camMode==='sw' ? ((fl.ext.w-a[3]-a[5]) + a[4]) : (a[3] + a[4]);
      const kb = camMode==='sw' ? ((fl.ext.w-b[3]-b[5]) + b[4]) : (b[3] + b[4]);
      return ka - kb;
    });

    sorted.forEach(([id, name, area, x, z, w, d, exec]) => {
      const hExec = WALL_H * exec / 100;
      const colors = roomFill(exec);
      const [, sColor] = statusOf(exec);

      // Parte executada
      if (exec > 0) {
        content += drawBox(x, z, w, d, yOff, yOff + hExec, colors);
      } else {
        // Piso do cômodo não iniciado (fino)
        content += drawBox(x, z, w, d, yOff, yOff + 0.04, colors);
      }

      // Ghost — parte a construir
      if (exec < 100) {
        content += drawBox(x, z, w, d, yOff + Math.max(hExec, 0.04), yOff + WALL_H,
          {top:'#d98a6f', side1:'#d98a6f', side2:'#d98a6f'}, {ghost:true});
      }

      // Coletar pontos para viewBox
      [[x,z],[x+w,z],[x,z+d],[x+w,z+d]].forEach(([px,pz]) => {
        [yOff, yOff+WALL_H].forEach(py => allPts.push(proj(px,py,pz)));
      });
    });

    // Labels por cima de tudo (só no modo pavimento único)
    if (floorMode !== 'empilhado') {
      sorted.forEach(([id, name, area, x, z, w, d, exec]) => {
        const [, sColor] = statusOf(exec);
        content += drawLabel(x, z, w, d, WALL_H + 0.55 + yOff, name, `${area}m² · ${exec}%`, sColor);
        allPts.push(proj(x+w/2, WALL_H+1.1+yOff, z+d/2));
      });
    } else {
      // Label do pavimento
      content += drawLabel(fl.ext.w/2 - 2, -1.5, 4, 1, yOff + WALL_H/2,
        fl.label.split('·')[0].trim(), fid==='terreo' ? 'PLS 25,35%' : 'A contratar',
        fid==='terreo' ? '#f59e0b' : '#8d8579');
    }
  });

  // viewBox
  const xs = allPts.map(p=>p[0]), ys = allPts.map(p=>p[1]);
  const pad = 40;
  const vx = Math.min(...xs)-pad, vy = Math.min(...ys)-pad;
  const vw = Math.max(...xs)-Math.min(...xs)+pad*2;
  const vh = Math.max(...ys)-Math.min(...ys)+pad*2;
  svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  svg.innerHTML = content;
}

// ═══ CONTROLES ═══════════════════════════════════════════════════
function setFloor(f) {
  floorMode = f;
  document.querySelectorAll('[data-f]').forEach(b => b.classList.toggle('on', b.dataset.f===f));
  render();
}
function setCam(c) {
  camMode = c;
  document.querySelectorAll('[data-v]').forEach(b => b.classList.toggle('on', b.dataset.v===c));
  render();
}

// ═══ PAINEL ══════════════════════════════════════════════════════
const STAGES = [
  {l:'Fundação',            s:100,st:'concluido',i:'04/05/26',f:'30/05/26',m:'1ª ✓'},
  {l:'Impermeabilização',   s:60, st:'andamento',i:'01/06/26',f:'07/09/26',m:'2ª'},
  {l:'Estrutura (pilares)', s:35, st:'andamento',i:'22/06/26',f:'03/08/26',m:'2ª'},
  {l:'Alvenaria térreo',    s:40, st:'andamento',i:'22/06/26',f:'03/08/26',m:'2ª'},
  {l:'Laje térreo',         s:0,  st:'pendente', i:'03/08/26',f:'17/08/26',m:'2ª'},
  {l:'Esgoto + hidráulica', s:30, st:'parcial',  i:'17/08/26',f:'31/08/26',m:'2ª'},
  {l:'Elétrica (infra)',    s:30, st:'parcial',  i:'31/08/26',f:'07/09/26',m:'2ª'},
  {l:'Cobertura+esquadrias',s:0,  st:'pendente', i:'07/09/26',f:'26/10/26',m:'3ª'},
  {l:'Chapisco+reboco',     s:0,  st:'pendente', i:'26/10/26',f:'12/02/27',m:'4ª'},
  {l:'Contrapiso+piso',     s:0,  st:'pendente', i:'12/02/27',f:'22/03/27',m:'4ª'},
  {l:'Acabamentos+louças',  s:0,  st:'pendente', i:'22/03/27',f:'30/03/27',m:'4ª'},
  {l:'1º e 2º pavimento',   s:0,  st:'contratar',i:'A definir',f:'—',      m:'5–7ª'},
];
const MEDS = [
  {n:'1ª ✓', d:'30/05/2026',p:'8,23%', v:'R$ 30.623',  st:'concluido'},
  {n:'2ª ~', d:'03/07/2026',p:'17,12%',v:'~R$ 63.718', st:'andamento'},
  {n:'3ª',   d:'26/10/2026',p:'7,10%', v:'~R$ 26.475', st:'pendente'},
  {n:'4ª',   d:'30/03/2027',p:'25,02%',v:'~R$ 93.297', st:'pendente'},
  {n:'5–7ª', d:'A definir', p:'39,00%',v:'~R$ 145.387',st:'contratar'},
];
const SC = {concluido:'#22c97e',andamento:'#f59e0b',parcial:'#3b82f6',pendente:'#6b7280',contratar:'#d98a6f'};
const SL = {concluido:'✅ Concluído',andamento:'🔨 Em andamento',parcial:'⚡ Parcial',pendente:'⏳ Pendente',contratar:'📋 A contratar'};

let tab = 'comodos';
function showTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t===t));
  renderPanel();
}

function renderPanel() {
  const el = document.getElementById('pb');
  if (tab === 'comodos') {
    const fl = FLOORS[floorMode === 'empilhado' ? 'terreo' : floorMode] || FLOORS.terreo;
    el.innerHTML = `<div style="font-size:9px;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">${fl.label}</div>` +
      fl.rooms.map(([id,n,a,x,z,w,d,ex]) => {
        const [st,c,lbl] = statusOf(ex);
        return `<div class="card" style="border-left-color:${c}">
          <div class="cn">${n}</div>
          <div class="ca">${a}m² · ${w.toFixed(2)}×${d.toFixed(2)}m</div>
          <div class="bg"><div class="bf" style="width:${ex}%;background:${c}"></div></div>
          <div class="pp">${ex}% · ${lbl}</div>
        </div>`;
      }).join('');
  }
  if (tab === 'etapas') {
    el.innerHTML = STAGES.map(s => `
      <div class="card" style="border-left-color:${SC[s.st]}">
        <div style="display:flex;justify-content:space-between"><div class="cn">${s.l}</div>
          <span style="font-size:9px;color:${SC[s.st]};font-weight:bold">${s.m}</span></div>
        <div class="ca">${s.i} → ${s.f}</div>
        <div class="bg"><div class="bf" style="width:${s.s}%;background:${SC[s.st]}"></div></div>
        <div class="pp">${s.s}% · ${SL[s.st]}</div>
      </div>`).join('');
  }
  if (tab === 'medicoes') {
    el.innerHTML = `<div style="font-size:9px;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Base R$ 372.888</div>` +
      MEDS.map(m => `
      <div class="card" style="border-left-color:${SC[m.st]}">
        <div style="display:flex;justify-content:space-between"><div class="cn">${m.n} medição</div>
          <span style="font-size:10px;color:${SC[m.st]};font-weight:bold">${m.p}</span></div>
        <div class="ca">${m.d}</div>
        <div style="font-size:11px;color:#f6f2ec">${m.v}</div>
        <div class="pp">${SL[m.st]}</div>
      </div>`).join('');
  }
}

// Init
renderPanel();
render();
</script>
