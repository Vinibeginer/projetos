<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Obra Mariára — Maquete 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --ink:#2b2622; --paper:#f6f2ec; --coral:#d98a6f; --coral-dk:#b5674e;
    --stone:#8d8579; --line:#d8cfc2; --green:#22c97e; --amber:#f59e0b;
    --blue:#3b82f6; --bg:#1a1714;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);font-family:'Courier New',monospace;overflow:hidden;}
  #canvas-wrap{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}

  /* HUD topo */
  #hud-top{
    position:fixed;top:0;left:0;right:0;padding:10px 14px;
    background:linear-gradient(180deg,rgba(20,17,15,.92),transparent);
    color:var(--paper);pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .title{font-size:15px;font-weight:bold;color:var(--coral);letter-spacing:.05em;}
  .sub{font-size:11px;opacity:.7;margin-top:2px;}
  #stat-box{
    text-align:right;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);
    border-radius:8px;padding:8px 12px;pointer-events:none;min-width:160px;
  }
  .stat-line{font-size:11px;opacity:.8;margin-bottom:3px;}
  .stat-val{color:var(--coral);font-weight:bold;}

  /* Painel lateral */
  #panel{
    position:fixed;right:0;top:0;bottom:0;width:240px;
    background:rgba(20,17,15,.94);border-left:1px solid rgba(255,255,255,.08);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #panel-header{
    padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);
    color:var(--coral);font-size:12px;font-weight:bold;letter-spacing:.05em;
  }
  #floor-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08);}
  .ftab{
    flex:1;padding:8px 4px;font-size:10px;font-family:'Courier New',monospace;
    background:transparent;border:none;color:rgba(255,255,255,.5);cursor:pointer;
    letter-spacing:.03em;transition:all .2s;
  }
  .ftab.active,.ftab:hover{background:rgba(217,138,111,.15);color:var(--coral);}
  #panel-body{flex:1;overflow-y:auto;padding:10px;}
  #panel-body::-webkit-scrollbar{width:4px;}
  #panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}

  .room-card{
    margin-bottom:8px;padding:8px 10px;
    background:rgba(255,255,255,.04);border-radius:6px;
    border-left:3px solid var(--stone);
  }
  .room-card.status-concluido{border-left-color:var(--green);}
  .room-card.status-andamento{border-left-color:var(--amber);}
  .room-card.status-pendente{border-left-color:var(--stone);}
  .room-name{font-size:11px;font-weight:bold;color:var(--paper);margin-bottom:4px;}
  .room-area{font-size:10px;color:var(--stone);margin-bottom:5px;}
  .room-bar-bg{height:4px;background:rgba(255,255,255,.1);border-radius:2px;}
  .room-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
  .room-pct{text-align:right;font-size:10px;margin-top:2px;color:var(--stone);}

  .stage-card{
    margin-bottom:6px;padding:8px 10px;
    background:rgba(255,255,255,.03);border-radius:6px;
    border-left:3px solid var(--stone);
  }
  .stage-card.concluido{border-left-color:var(--green);}
  .stage-card.andamento{border-left-color:var(--amber);}
  .stage-card.parcial{border-left-color:var(--blue);}
  .stage-card.contratar{border-left-color:var(--coral);}
  .stage-name{font-size:11px;font-weight:bold;color:var(--paper);margin-bottom:2px;}
  .stage-date{font-size:9px;color:var(--stone);margin-bottom:4px;}
  .stage-med{font-size:9px;color:var(--coral);}
  .stage-bar-bg{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px;}
  .stage-bar-fill{height:100%;border-radius:2px;}

  /* Controles */
  #controls{
    position:fixed;bottom:0;left:0;right:240px;
    padding:10px 14px;background:linear-gradient(0deg,rgba(20,17,15,.88),transparent);
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  }
  .btn{
    padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    color:var(--paper);border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:.03em;
  }
  .btn:hover,.btn.active{background:rgba(217,138,111,.25);border-color:var(--coral);color:var(--coral);}
  #view-label{font-size:10px;color:var(--stone);margin-left:8px;}
  
  /* Legenda */
  #legend{
    position:fixed;bottom:50px;left:14px;
    background:rgba(20,17,15,.8);border:1px solid rgba(255,255,255,.08);
    border-radius:6px;padding:8px 10px;font-size:10px;color:var(--paper);
  }
  .leg-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

  @media(max-width:600px){
    #panel{width:100%;top:auto;height:50%;border-left:none;border-top:1px solid rgba(255,255,255,.08);}
    #controls{right:0;bottom:50%;}
  }
</style>
</head>
<body>

<script>
// ── DADOS DA OBRA ──────────────────────────────────────────────
// Baseado na planta aprovada (Processo 56954 · Planta 934)

const OBRA = {

};

// Pavimentos — dimensões reais em metros
const FLOORS = {

  pav1:   { label:'1º Pavimento',  w:8.70, d:8.60, h:2.80, y:2.95 },

// Origem (0,0) = canto inferior esquerdo da planta
// X = leste, Z = norte (profundidade)

// Parede divisória horizontal em z=5.85 (garagem/cozinha) e z=7.45 (suite/despensa)

    // Direita (x: 4.30 a 8.55)

    { id:'circ',      name:'Circulação',       area:9.12,  x:4.45, z:4.30, w:2.20, d:4.15, exec:0, cor:0x37474f },
    { id:'closet1',   name:'Closet 1',         area:4.00,  x:6.80, z:4.30, w:1.75, d:2.00, exec:0, cor:0x4e342e },
    { id:'closet2',   name:'Closet 2',         area:4.88,  x:6.80, z:6.45, w:1.75, d:2.00, exec:0, cor:0x4e342e },
    { id:'banh',      name:'Banheiro',         area:3.65,  x:4.45, z:8.60-0.15-1.65, w:2.20, d:1.65, exec:0, cor:0x880e4f },
    { id:'suite_m',   name:'Suíte (banh.)',    area:3.71,  x:0.15, z:8.60-0.15-1.65, w:4.10, d:1.65, exec:0, cor:0xad1457 },
    { id:'varanda',   name:'Varanda coberta',  area:9.14,  x:0.15, z:8.60-0.15-1.65-2.20, w:8.55, d:2.20, exec:0, cor:0x33691e },
  ],
  pav2: [
    { id:'sala2',     name:'Área social',      area:28.85, x:0.15, z:0.15, w:8.40, d:3.60, exec:0, cor:0x37474f },
    { id:'varanda2',  name:'Varanda descoberta',area:37.85,x:0.15, z:3.90, w:8.40, d:5.00, exec:0, cor:0x1b5e20 },
  ],
};

// Etapas do cronograma
const STAGES = [
  {id:'fundacao',    label:'Fundação',                 inicio:'04/05/2026', fim:'30/05/2026', status:'concluido', medicao:'1ª ✓', pct:100},
  {id:'impermeab',   label:'Impermeabilização',        inicio:'01/06/2026', fim:'07/09/2026', status:'andamento', medicao:'2ª',   pct:60},
  {id:'estrutura',   label:'Estrutura (pilares/vigas)',inicio:'22/06/2026', fim:'03/08/2026', status:'andamento', medicao:'2ª',   pct:35},
  {id:'alvenaria',   label:'Alvenaria térreo',         inicio:'22/06/2026', fim:'03/08/2026', status:'andamento', medicao:'2ª',   pct:40},
  {id:'laje',        label:'Laje térreo',              inicio:'03/08/2026', fim:'17/08/2026', status:'pendente',  medicao:'2ª',   pct:0},
  {id:'esgoto',      label:'Esgoto + hidráulica',      inicio:'17/08/2026', fim:'31/08/2026', status:'parcial',   medicao:'2ª',   pct:30},
  {id:'eletrica',    label:'Elétrica (infra)',          inicio:'31/08/2026', fim:'07/09/2026', status:'parcial',   medicao:'2ª',   pct:30},
  {id:'cobertura',   label:'Cobertura + esquadrias',   inicio:'07/09/2026', fim:'26/10/2026', status:'pendente',  medicao:'3ª',   pct:0},
  {id:'revestimento',label:'Chapisco + reboco',        inicio:'26/10/2026', fim:'12/02/2027', status:'pendente',  medicao:'4ª',   pct:0},
  {id:'piso',        label:'Contrapiso + piso',        inicio:'12/02/2027', fim:'22/03/2027', status:'pendente',  medicao:'4ª',   pct:0},
  {id:'acabamento',  label:'Acabamentos + louças',     inicio:'22/03/2027', fim:'30/03/2027', status:'pendente',  medicao:'4ª',   pct:0},
  {id:'pav12',       label:'1º e 2º pavimento',        inicio:'A definir',  fim:'A definir',  status:'contratar', medicao:'5ª–7ª',pct:0},
];

const STATUS_COLOR = {
  concluido:'#22c97e', andamento:'#f59e0b', parcial:'#3b82f6',
  pendente:'#6b7280', contratar:'#d98a6f',
};
const STATUS_LABEL = {
  concluido:'✅ Concluído', andamento:'🔨 Em andamento', parcial:'⚡ Parcial',
  pendente:'⏳ Pendente', contratar:'📋 A contratar',
};

// ── THREE.JS SETUP ─────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x1a1714);
scene.fog = new THREE.Fog(0x1a1714, 40, 80);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

// Luzes
scene.add(new THREE.AmbientLight(0xfff5e0, 0.5));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.0);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 60;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top = 20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x88aacc, 0.35);
fill.position.set(-10, 8, -10);
scene.add(fill);

// Terreno
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({color:0x1f1c1a, roughness:1})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Lote (9m x 20m)
const lot = new THREE.Mesh(
  new THREE.PlaneGeometry(9, 20),
  new THREE.MeshStandardMaterial({color:0x2d3a1e, roughness:1})
);
lot.rotation.x = -Math.PI/2;
lot.position.set(4.35, 0.005, 10);
lot.receiveShadow = true;
scene.add(lot);

// Borda do lote
const lotEdges = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(9, 0.01, 20)),
  new THREE.LineBasicMaterial({color:0xd98a6f, opacity:0.5, transparent:true})
);
lotEdges.position.set(4.35, 0.005, 10);
scene.add(lotEdges);

// ── CÂMERA E CONTROLES ─────────────────────────────────────────
let camTheta = Math.PI/4, camPhi = Math.PI/4, camRadius = 22;
let camTarget = new THREE.Vector3(4.35, 2, 4.3);
let isDragging = false, lastMX = 0, lastMY = 0;

function updateCam(){
  const x = camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  const y = camTarget.y + camRadius * Math.cos(camPhi);
  const z = camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.set(x, y, z);
  camera.lookAt(camTarget);
}
updateCam();

renderer.domElement.addEventListener('mousedown', e=>{isDragging=true; lastMX=e.clientX; lastMY=e.clientY;});
window.addEventListener('mouseup', ()=>isDragging=false);
window.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  camTheta -= dx * 0.008;
  camPhi = Math.max(0.08, Math.min(Math.PI/2-0.02, camPhi + dy*0.006));
  lastMX = e.clientX; lastMY = e.clientY;
  updateCam();
});
renderer.domElement.addEventListener('wheel', e=>{
  camRadius = Math.max(4, Math.min(40, camRadius + e.deltaY * 0.02));
  updateCam(); e.preventDefault();
}, {passive:false});

// Touch
let t0x=0,t0y=0,tDist0=0;
renderer.domElement.addEventListener('touchstart', e=>{
  if(e.touches.length===1){isDragging=true; t0x=e.touches[0].clientX; t0y=e.touches[0].clientY;}
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY; tDist0=Math.hypot(dx,dy);}
},{passive:true});
window.addEventListener('touchend', ()=>isDragging=false);
window.addEventListener('touchmove', e=>{
  if(e.touches.length===1 && isDragging){
    const dx=e.touches[0].clientX-t0x, dy=e.touches[0].clientY-t0y;
    camTheta-=dx*0.008; camPhi=Math.max(0.08,Math.min(Math.PI/2-0.02,camPhi+dy*0.006));
    t0x=e.touches[0].clientX; t0y=e.touches[0].clientY; updateCam();
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy); camRadius=Math.max(4,Math.min(40,camRadius*(tDist0/dist))); tDist0=dist; updateCam();
  }
},{passive:true});

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function setCam(mode){
  document.querySelectorAll('#controls .btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+mode)?.classList.add('active');
  if(mode==='iso'){ camTheta=Math.PI/4; camPhi=Math.PI/4; camRadius=22; camTarget.set(4.35,2,4.3); }
  if(mode==='top'){ camTheta=0; camPhi=0.05; camRadius=18; camTarget.set(4.35,0,4.3); }
  if(mode==='front'){ camTheta=0; camPhi=Math.PI/3; camRadius=18; camTarget.set(4.35,3,4.3); }
  updateCam();
}

// ── HELPERS ────────────────────────────────────────────────────
function box(w, h, d, color, opacity=1, wire=false){
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = wire
    ? new THREE.MeshBasicMaterial({color, wireframe:true, transparent:true, opacity})
    : new THREE.MeshStandardMaterial({color, roughness:.82, metalness:.02, transparent:opacity<1, opacity});
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = !wire; m.receiveShadow = !wire;
  return m;
}

function makeLabel(line1, line2, color='#d98a6f'){
  const cnv = document.createElement('canvas');
  cnv.width = 512; cnv.height = 128;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = 'rgba(20,17,15,0.88)';
  ctx.beginPath(); ctx.roundRect(0,0,512,128,12); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(2,2,508,124,12); ctx.stroke();
  ctx.fillStyle = '#f6f2ec'; ctx.font='bold 30px Courier New'; ctx.fillText(line1, 18, 48);
  ctx.fillStyle = color;    ctx.font='22px Courier New';       ctx.fillText(line2, 18, 88);
  const tex = new THREE.CanvasTexture(cnv);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
  spr.scale.set(3.5, 0.88, 1);
  return spr;
}

function lerp3Color(hex, t){
  // tijolo cru → rebocado branco
  const raw  = new THREE.Color(0xcabfae);
  const white= new THREE.Color(0xf0ebe2);
  return raw.lerp(white, Math.max(0,Math.min(1,t)));
}

// ── CONSTRUÇÃO DA CENA ─────────────────────────────────────────
let buildGroup = new THREE.Group();
scene.add(buildGroup);

// Avanço global por item do tracker
const progress = {
  alvenaria:    40,  // item 4  — PLS 40%
  estrutura:    35,  // item 3  — PLS 35%
  impermeab:    60,  // item 8  — PLS 60%
  eletrica:     30,  // item 15 — PLS 30%
  hidraulica:   20,  // item 16 — PLS 20%
  esgoto:      100,  // item 17 — 100%
  cobertura:     0,
  revestimento:  0,
  acabamento:    0,
  piso:          0,
};

let currentView = 'all';

function buildScene(){
  scene.remove(buildGroup);
  buildGroup = new THREE.Group();

  if(currentView !== 'all'){
    buildFloorDetailed(currentView);
    scene.add(buildGroup);
    return;
  }

  // Vista completa — 3 pavimentos empilhados
  buildFloorFull('terreo', 0);
  buildFloorFull('pav1',   2.95);
  buildFloorFull('pav2',   5.90);
  buildCobertura(8.70);

  scene.add(buildGroup);
  camTarget.set(4.35, 3, 4.3);
  camRadius = 22;
  updateCam();
}

function buildFloorFull(floorId, yBase){
  const fl = FLOORS[floorId];
  const rooms = ROOMS[floorId];
  const alvPct = (floorId==='terreo' ? progress.alvenaria : 0) / 100;
  const acabPct = progress.acabamento / 100;
  const wallColor = lerp3Color(0xcabfae, acabPct);

  // Laje/base
  const slab = box(fl.w, 0.15, fl.d, 0x7a7268);
  slab.position.set(fl.w/2, yBase - 0.075, fl.d/2);
  buildGroup.add(slab);

  if(rooms && alvPct > 0.01){
    // Renderizar cada cômodo como bloco separado
    rooms.forEach(r => {
      const roomPct = Math.min(1, alvPct + (r.exec/100 - alvPct) * 0.5);
      const wallH = fl.h * Math.max(0.02, r.exec/100);
      const cx = r.x + r.w/2;
      const cz = r.z + r.d/2;

      // Paredes do cômodo
      if(wallH > 0.05){
        const wallM = box(r.w, wallH, r.d, wallColor);
        wallM.position.set(cx, yBase + wallH/2, cz);
        buildGroup.add(wallM);

        // Borda colorida do cômodo (identifica o ambiente)
        const edge = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(r.w, wallH, r.d)),
          new THREE.LineBasicMaterial({color:r.cor, opacity:0.6, transparent:true})
        );
        edge.position.set(cx, yBase + wallH/2, cz);
        buildGroup.add(edge);
      }

      // Ghost (parte não executada)
      if(r.exec < 100){
        const ghostH = fl.h * (1 - r.exec/100);
        const ghostY = yBase + fl.h*r.exec/100 + ghostH/2;
        const ghost = box(r.w, Math.max(0.05, ghostH), r.d, r.cor, 0.08, true);
        ghost.position.set(cx, ghostY, cz);
        buildGroup.add(ghost);
      }
    });
  } else if(alvPct <= 0.01) {
    // Pavimento não iniciado — ghost completo
    const ghost = box(fl.w, fl.h, fl.d, 0xd98a6f, 0.07, true);
    ghost.position.set(fl.w/2, yBase + fl.h/2, fl.d/2);
    buildGroup.add(ghost);
  }

  // Label do pavimento
  const lbl = makeLabel(
    fl.label + ' · ' + fl.w + 'x' + fl.d + 'm',
    floorId==='terreo' ? 'Alvenaria: '+progress.alvenaria+'% · PLS 25,35%'
                       : 'A contratar — pendente laje térreo',
    floorId==='terreo' ? '#f59e0b' : '#6b7280'
  );
  lbl.position.set(fl.w/2, yBase + fl.h + 0.9, fl.d/2);
  buildGroup.add(lbl);
}

function buildFloorDetailed(floorId){
  const fl = FLOORS[floorId];
  const rooms = ROOMS[floorId];
  const acabPct = progress.acabamento / 100;
  const wallColor = lerp3Color(0xcabfae, acabPct);

  // Laje
  const slab = box(fl.w, 0.15, fl.d, 0x7a7268);
  slab.position.set(fl.w/2, -0.075, fl.d/2);
  buildGroup.add(slab);

  // Cada cômodo detalhado
  if(rooms) rooms.forEach(r => {
    const wallH = fl.h * Math.max(0.02, r.exec/100);
    const cx = r.x + r.w/2;
    const cz = r.z + r.d/2;

    if(r.exec > 0){
      // Parede executada
      const wallM = box(r.w, wallH, r.d, wallColor);
      wallM.position.set(cx, wallH/2, cz);
      buildGroup.add(wallM);
    }

    // Ghost da parte não executada
    if(r.exec < 100){
      const ghostH = fl.h * (1 - r.exec/100);
      const ghostY = fl.h * r.exec/100 + ghostH/2;
      const ghost = box(r.w, Math.max(0.05, ghostH), r.d, r.cor, 0.12, true);
      ghost.position.set(cx, ghostY, cz);
      buildGroup.add(ghost);

      // Contorno sólido fino no topo do executado
      if(r.exec > 0){
        const line = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(r.w+0.02, 0.04, r.d+0.02)),
          new THREE.LineBasicMaterial({color:r.cor})
        );
        line.position.set(cx, wallH+0.02, cz);
        buildGroup.add(line);
      }
    }

    // Label do cômodo
    const lbl = makeLabel(r.name, r.area+'m²  '+r.exec+'%', '#'+r.cor.toString(16).padStart(6,'0'));
    lbl.scale.set(2.2, 0.55, 1);
    lbl.position.set(cx, fl.h + 0.7, cz);
    buildGroup.add(lbl);
  });

  camTarget.set(fl.w/2, fl.h/2, fl.d/2);
  camRadius = Math.max(fl.w, fl.d) * 1.6;
  updateCam();
}

function buildCobertura(yBase){
  // Cobertura ghost
  const ghost = box(8.70, 0.5, 8.60, 0xd98a6f, 0.06, true);
  ghost.position.set(4.35, yBase + 0.25, 4.3);
  buildGroup.add(ghost);
  const lbl = makeLabel('Cobertura', 'Pendente · 3ª medição', '#6b7280');
  lbl.position.set(4.35, yBase + 1.2, 4.3);
  buildGroup.add(lbl);
}

function setView(v){
  currentView = v;
  document.querySelectorAll('#controls .btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+v)?.classList.add('active');
  buildScene();
}

buildScene();

// ── PAINEL LATERAL ─────────────────────────────────────────────
let currentTab = 'rooms';
let currentFloor = 'terreo';

function showTab(tab){
  currentTab = tab;
  document.querySelectorAll('.ftab').forEach((b,i)=>{
    b.classList.toggle('active', ['rooms','stages','cronograma'][i]===tab);
  });
  renderPanel();
}

function renderPanel(){
  const el = document.getElementById('panel-body');
  if(currentTab === 'rooms') renderRooms(el);
  if(currentTab === 'stages') renderStages(el);
  if(currentTab === 'cronograma') renderCronograma(el);
}

function renderRooms(el){
  const rooms = ROOMS.terreo;
  const html = '<div style="font-size:10px;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Térreo — 89m²</div>' +
    rooms.map(r => {
      const c = r.exec===100?'concluido':r.exec>0?'andamento':'pendente';
      const cor = STATUS_COLOR[c];
      return '<div class="room-card status-'+c+'" style="border-left-color:'+cor+'">' +
        '<div class="room-name">'+r.name+'</div>' +
        '<div class="room-area">'+r.area+'m² · '+r.w.toFixed(2)+'×'+r.d.toFixed(2)+'m</div>' +
        '<div class="room-bar-bg"><div class="room-bar-fill" style="width:'+r.exec+'%;background:'+cor+'"></div></div>' +
        '<div class="room-pct">'+r.exec+'%</div>' +
      '</div>';
    }).join('') +
    '<div style="font-size:10px;color:#6b7280;margin:12px 0 8px;text-transform:uppercase;letter-spacing:.05em">1º e 2º Pavimento</div>' +
    '<div class="room-card" style="border-left-color:#d98a6f;padding:12px">' +
      '<div class="room-name" style="color:#d98a6f">📋 A contratar</div>' +
      '<div class="room-area">Aguardando conclusão do térreo</div>' +
      '<div class="room-area">Início estimado: após mar/2027</div>' +
    '</div>';
  el.innerHTML = html;
}

function renderStages(el){
  el.innerHTML = STAGES.map(s => {
    const c = STATUS_COLOR[s.status];
    return '<div class="stage-card '+s.status+'" style="border-left-color:'+c+'">' +
      '<div class="stage-name">'+s.label+'</div>' +
      '<div class="stage-date">'+s.inicio+' → '+s.fim+'</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div class="stage-med">Med. '+s.medicao+'</div>' +
        '<span style="font-size:10px;color:'+c+';font-weight:bold">'+STATUS_LABEL[s.status]+'</span>' +
      '</div>' +
      '<div class="stage-bar-bg"><div class="stage-bar-fill" style="width:'+s.pct+'%;background:'+c+'"></div></div>' +
    '</div>';
  }).join('');
}

function renderCronograma(el){
  const meds = [
    {n:'1ª ✓', data:'30/05/2026', pls:'8,23%',  val:'R$ 30.623',  status:'concluido'},
    {n:'2ª ~', data:'03/07/2026', pls:'17,12%', val:'~R$ 63.718', status:'andamento'},
    {n:'3ª',   data:'26/10/2026', pls:'7,10%',  val:'~R$ 26.475', status:'pendente'},
    {n:'4ª',   data:'30/03/2027', pls:'25,02%', val:'~R$ 93.297', status:'pendente'},
    {n:'5ª–7ª',data:'A definir', pls:'39,00%', val:'~R$ 145.387',status:'contratar'},
  ];
  el.innerHTML = '<div style="font-size:10px;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Medições CAIXA · Base R$ 372.888</div>' +
    meds.map(m=>{
      const c = STATUS_COLOR[m.status];
      return '<div class="stage-card '+m.status+'" style="border-left-color:'+c+'">' +
        '<div style="display:flex;justify-content:space-between">' +
          '<div class="stage-name">'+m.n+' medição</div>' +
          '<div style="font-size:10px;font-weight:bold;color:'+c+'">'+m.pls+'</div>' +
        '</div>' +
        '<div class="stage-date">'+m.data+'</div>' +
        '<div style="font-size:11px;color:#f6f2ec;margin-top:2px">'+m.val+'</div>' +
      '</div>';
    }).join('');
}

renderPanel();

// Loop de render
(function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
})();
</script>
