<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Obra Mariára — Maquete 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --ink:#2b2622;
    --paper:#f6f2ec;
    --coral:#d98a6f;
    --coral-dk:#b5674e;
    --stone:#8d8579;
    --line:#d8cfc2;
    --slab:#c9c0b2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--ink);font-family:'Courier New',monospace;overflow:hidden;}
  #canvas-wrap{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}

  #top{
    position:fixed;top:0;left:0;right:0;
    padding:10px 14px;
    background:linear-gradient(180deg, rgba(20,17,15,.85), rgba(20,17,15,0));
    color:var(--paper);
    font-size:12px;
    letter-spacing:.03em;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
  }
  #top .title{font-size:14px;font-weight:bold;color:var(--coral);}
  #top .sub{opacity:.75;margin-top:2px;}
  #area-box{
    text-align:right;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.15);
    padding:6px 10px;
    pointer-events:auto;
  }
  #area-box b{color:var(--coral);}

  #panel{
    position:fixed; left:0; right:0; bottom:0;
    background:var(--paper);
    border-top:2px solid var(--coral-dk);
    max-height:46vh;
    overflow-y:auto;
    padding:10px 12px 16px;
    font-size:12.5px;
    color:var(--ink);
  }
  #panel h3{margin:2px 0 8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--coral-dk);}
  .stage{
    display:flex; align-items:center; gap:8px;
    padding:7px 8px; margin-bottom:6px;
    background:#fff; border:1px solid var(--line); border-radius:6px;
  }
  .stage.done{border-color:var(--coral); background:#fdf3ef;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--line);flex:none;}
  .stage.done .dot{background:var(--coral);}
  .stage .lbl{flex:1;}
  .stage .lbl b{display:block;}
  .stage .lbl span{opacity:.6;font-size:11px;}
  .btn{
    border:1px solid var(--coral-dk); background:var(--coral); color:#fff;
    padding:6px 10px; border-radius:5px; font-family:inherit; font-size:11px;
    cursor:pointer; white-space:nowrap;
  }
  .btn.undo{background:#fff;color:var(--coral-dk);}
  #camrow{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;}
  #camrow button{
    flex:1; min-width:64px; border:1px solid var(--stone); background:#fff; color:var(--ink);
    padding:6px 4px; border-radius:5px; font-family:inherit; font-size:11px; cursor:pointer;
  }
  #camrow button:active{background:var(--coral); color:#fff;}
  #hint{position:fixed; top:52px; left:14px; color:rgba(255,255,255,.55); font-size:11px; pointer-events:none;}
  #reset{position:fixed; top:8px; right:8px; opacity:.4;}
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="top">
  <div>
    <div class="title">Obra Mariára</div>
    <div class="sub">Av. Projetada, Q.H, Lote 38 — Res. Village, Campos dos Goytacazes/RJ</div>
  </div>
  <div id="area-box">
    Terreno: <b>180 m²</b><br>
    Construída: <b>227 m²</b>
  </div>
</div>
<div id="hint">arraste para girar · pinça/roda para zoom</div>

<div id="panel">
  <div id="camrow">
    <button data-cam="front">Frente</button>
    <button data-cam="side">Lateral</button>
    <button data-cam="top">Topo</button>
    <button data-cam="iso">Isométrica</button>
  </div>
  <h3>Andamento da obra</h3>
  <div id="stages"></div>
</div>

<script>
// ---------- Dados do projeto (extraídos do projeto aprovado) ----------
const STAGES = [
  {id:'fundacao', label:'Fundação', sub:'Sapatas, baldrame e radier'},
  {id:'terreo',   label:'Alvenaria — Térreo', sub:'Garagem, sala, cozinha, suíte (89 m²)'},
  {id:'pav1',     label:'Alvenaria — 1º Pavimento', sub:'Suíte master, quartos, escritório (89 m²)'},
  {id:'pav2',     label:'Alvenaria — 2º Pavimento', sub:'Sala e quarto + varanda descoberta (49 m²)'},
  {id:'cobertura',label:'Cobertura', sub:'Telha fibrocimento (8–9,86%) + laje impermeabilizada'},
  {id:'acabamento',label:'Acabamento', sub:'Pintura branca/coral, guarda-corpo, pedra moledo'}
];
const STORE_KEY = 'obra-mariara-progress';

const LOT = {w:9, d:20};
const FLOORS = {
  terreo: {w:8.6, d:10.35, h:3, y0:0.25},
  pav1:   {w:8.6, d:10.35, h:3},
  pav2:   {w:8.6, d:5.7,  h:3, terraceD:4.65}
};

// ---------- Estado ----------
let progress = {fundacao:false, terreo:false, pav1:false, pav2:false, cobertura:false, acabamento:false};

async function loadProgress(){
  try{
    const r = await window.storage.get(STORE_KEY, false);
    if(r && r.value) progress = JSON.parse(r.value);
  }catch(e){ /* sem dados salvos ainda */ }
  renderPanel();
  buildScene();
}
async function saveProgress(){
  try{ await window.storage.set(STORE_KEY, JSON.stringify(progress), false); }catch(e){}
}

function renderPanel(){
  const el = document.getElementById('stages');
  el.innerHTML = '';
  STAGES.forEach(s=>{
    const done = progress[s.id];
    const row = document.createElement('div');
    row.className = 'stage' + (done?' done':'');
    row.innerHTML = `<div class="dot"></div>
      <div class="lbl"><b>${s.label}</b><span>${s.sub}</span></div>
      <button class="btn ${done?'undo':''}" data-stage="${s.id}">${done?'Desfazer':'Concluir'}</button>`;
    el.appendChild(row);
  });
  el.querySelectorAll('button[data-stage]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const id = b.getAttribute('data-stage');
      progress[id] = !progress[id];
      saveProgress();
      renderPanel();
      buildScene();
    });
  });
}

// ---------- Cena Three.js ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1815);
scene.fog = new THREE.Fog(0x1c1815, 30, 70);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff2e0, 0.9);
sun.position.set(12,20,10);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x88aacc, 0.3);
fill.position.set(-10,8,-10);
scene.add(fill);

// chão / lote
const groundGeo = new THREE.PlaneGeometry(60,60);
const groundMat = new THREE.MeshStandardMaterial({color:0x241f1b, roughness:1});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

const lotShape = new THREE.Mesh(
  new THREE.PlaneGeometry(LOT.w, LOT.d),
  new THREE.MeshStandardMaterial({color:0x3a4a34, roughness:1})
);
lotShape.rotation.x = -Math.PI/2;
lotShape.position.y = 0.01;
scene.add(lotShape);

const lotEdges = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(LOT.w,0.02,LOT.d)),
  new THREE.LineBasicMaterial({color:0xd98a6f})
);
lotEdges.position.y = 0.02;
scene.add(lotEdges);

let buildGroup = new THREE.Group();
scene.add(buildGroup);

function makeLabel(text, sub){
  const cnv = document.createElement('canvas');
  cnv.width = 512; cnv.height = 128;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = 'rgba(20,17,15,0.82)';
  roundRect(ctx,0,0,512,128,14); ctx.fill();
  ctx.strokeStyle = '#d98a6f'; ctx.lineWidth=3;
  roundRect(ctx,3,3,506,122,14); ctx.stroke();
  ctx.fillStyle = '#f6f2ec'; ctx.font = 'bold 34px Courier New'; ctx.fillText(text, 22, 54);
  ctx.fillStyle = '#d98a6f'; ctx.font = '24px Courier New'; ctx.fillText(sub, 22, 92);
  const tex = new THREE.CanvasTexture(cnv);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true});
  const spr = new THREE.Sprite(mat);
  spr.scale.set(3.2,0.8,1);
  return spr;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function box(w,h,d,color,opacity=1,wire=false){
  const geo = new THREE.BoxGeometry(w,h,d);
  const mat = wire
    ? new THREE.MeshBasicMaterial({color, wireframe:true, transparent:true, opacity})
    : new THREE.MeshStandardMaterial({color, roughness:.85, transparent:opacity<1, opacity});
  return new THREE.Mesh(geo, mat);
}

function buildScene(){
  scene.remove(buildGroup);
  buildGroup = new THREE.Group();

  const anyStarted = progress.fundacao;
  const finished = progress.acabamento;
  const wallColorRaw = 0xcabfae;   // concreto/reboco cru
  const wallColorWhite = 0xf3ede4; // pintura branca
  const coral = 0xd98a6f;          // algodão egípcio
  const stone = 0x6f6559;          // pedra moledo
  const black = 0x222222;          // guarda-corpo preto

  // --- fantasma do projeto completo (antes da fundação) ---
  if(!anyStarted){
    const ghost = box(FLOORS.terreo.w, 9.6, FLOORS.terreo.d, 0xd98a6f, 0.12, true);
    ghost.position.set(0, 4.8, 0);
    buildGroup.add(ghost);
    buildGroup.add(makeLabel('PROJETO APROVADO', '227 m² · aguardando início'));
    buildGroup.children[buildGroup.children.length-1].position.set(0, 10.6, 0);
  }

  let y = 0;
  // --- fundação ---
  if(progress.fundacao){
    const slab = box(FLOORS.terreo.w+0.3, 0.3, FLOORS.terreo.d+0.3, 0x8a8378);
    slab.position.set(0, 0.15, 0);
    buildGroup.add(slab);
    y = 0.3;
  }

  // --- térreo ---
  if(progress.terreo){
    const c = finished ? wallColorWhite : wallColorRaw;
    const m = box(FLOORS.terreo.w, FLOORS.terreo.h, FLOORS.terreo.d, c);
    m.position.set(0, y + FLOORS.terreo.h/2, 0);
    buildGroup.add(m);
    if(finished){
      const band = box(FLOORS.terreo.w+0.05, 0.6, FLOORS.terreo.d+0.05, stone);
      band.position.set(0, y+0.3, 0);
      buildGroup.add(band);
    }
    buildGroup.add(makeLabel('TÉRREO · 89 m²', 'garagem · sala · cozinha · suíte'));
    buildGroup.children[buildGroup.children.length-1].position.set(FLOORS.terreo.w/2+2.3, y+1.5, 0);
    y += FLOORS.terreo.h;
  }

  // --- 1º pavimento ---
  if(progress.pav1){
    const c = finished ? wallColorWhite : wallColorRaw;
    const m = box(FLOORS.pav1.w, FLOORS.pav1.h, FLOORS.pav1.d, c);
    m.position.set(0, y + FLOORS.pav1.h/2, 0);
    buildGroup.add(m);
    if(finished){
      const band = box(FLOORS.pav1.w+0.05, 0.5, FLOORS.pav1.d+0.05, coral);
      band.position.set(0, y+FLOORS.pav1.h-0.3, 0);
      buildGroup.add(band);
    }
    buildGroup.add(makeLabel('1º PAV · 89 m²', 'master · quartos · escritório'));
    buildGroup.children[buildGroup.children.length-1].position.set(FLOORS.pav1.w/2+2.3, y+1.5, 0);
    y += FLOORS.pav1.h;
  }

  const pav2ZOffset = -(FLOORS.pav1.d - FLOORS.pav2.d)/2; // recuo alinhado ao fundo
  // --- 2º pavimento (área coberta + terraço) ---
  if(progress.pav2){
    const c = finished ? wallColorWhite : wallColorRaw;
    const m = box(FLOORS.pav2.w, FLOORS.pav2.h, FLOORS.pav2.d, c);
    m.position.set(0, y + FLOORS.pav2.h/2, pav2ZOffset);
    buildGroup.add(m);

    // terraço descoberto (laje) na frente
    const terraceZ = pav2ZOffset + FLOORS.pav2.d/2 + FLOORS.pav2.terraceD/2;
    const terrace = box(FLOORS.pav2.w, 0.25, FLOORS.pav2.terraceD, 0xb7ada0);
    terrace.position.set(0, y+0.12, terraceZ);
    buildGroup.add(terrace);
    // guarda-corpo do terraço
    const rail = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(FLOORS.pav2.w, 0.9, FLOORS.pav2.terraceD)),
      new THREE.LineBasicMaterial({color: black})
    );
    rail.position.set(0, y+0.45, terraceZ);
    buildGroup.add(rail);

    buildGroup.add(makeLabel('2º PAV · 49 m²', 'sala · quarto + varanda'));
    buildGroup.children[buildGroup.children.length-1].position.set(FLOORS.pav2.w/2+2.3, y+1.5, pav2ZOffset);
    y += FLOORS.pav2.h;
  }

  // --- cobertura ---
  if(progress.cobertura){
    const roofColor = finished ? 0x9a9186 : 0xa6a099;
    const roofW = FLOORS.pav2.w + 0.6, roofD = FLOORS.pav2.d + 0.6;
    const roofGeo = new THREE.ConeGeometry(Math.max(roofW,roofD)/1.55, 1.1, 4, 1);
    const roof = new THREE.Mesh(roofGeo, new THREE.MeshStandardMaterial({color:roofColor, roughness:.9}));
    roof.rotation.y = Math.PI/4;
    roof.scale.set(roofW/roofD>1? roofW/roofD:1, 1, roofD/roofW>1? roofD/roofW:1);
    roof.position.set(0, y+0.55, pav2ZOffset);
    buildGroup.add(roof);

    // laje impermeabilizada sobre o terraço
    const slabRoof = box(FLOORS.pav2.w, 0.15, FLOORS.pav2.terraceD, 0x55524c);
    const terraceZ = pav2ZOffset + FLOORS.pav2.d/2 + FLOORS.pav2.terraceD/2;
    slabRoof.position.set(0, y+0.07, terraceZ);
    buildGroup.add(slabRoof);

    buildGroup.add(makeLabel('COBERTURA', 'telha fibrocimento 8–9,86%'));
    buildGroup.children[buildGroup.children.length-1].position.set(0, y+2.3, pav2ZOffset);
  }

  if(finished){
    buildGroup.add(makeLabel('ACABAMENTO CONCLUÍDO', 'pintura branca/coral · pedra moledo'));
    buildGroup.children[buildGroup.children.length-1].position.set(0, y+2.9, 1.5);
  }

  scene.add(buildGroup);
}

// ---------- Câmera / controles manuais (arrastar + zoom) ----------
let camTarget = new THREE.Vector3(0,3,0);
let radius = 22, theta = Math.PI/4, phi = 1.1;
function updateCam(){
  camera.position.x = camTarget.x + radius*Math.sin(phi)*Math.sin(theta);
  camera.position.y = camTarget.y + radius*Math.cos(phi);
  camera.position.z = camTarget.z + radius*Math.sin(phi)*Math.cos(theta);
  camera.lookAt(camTarget);
}
updateCam();

let dragging=false, lastX=0, lastY=0;
const dom = renderer.domElement;
function pointerDown(x,y){ dragging=true; lastX=x; lastY=y; }
function pointerMove(x,y){
  if(!dragging) return;
  theta -= (x-lastX)*0.006;
  phi   -= (y-lastY)*0.006;
  phi = Math.max(0.35, Math.min(1.5, phi));
  lastX=x; lastY=y;
  updateCam();
}
function pointerUp(){ dragging=false; }

dom.addEventListener('mousedown', e=>pointerDown(e.clientX,e.clientY));
window.addEventListener('mousemove', e=>pointerMove(e.clientX,e.clientY));
window.addEventListener('mouseup', pointerUp);
dom.addEventListener('touchstart', e=>{const t=e.touches[0]; pointerDown(t.clientX,t.clientY);}, {passive:true});
dom.addEventListener('touchmove', e=>{const t=e.touches[0]; pointerMove(t.clientX,t.clientY);}, {passive:true});
dom.addEventListener('touchend', pointerUp);
dom.addEventListener('wheel', e=>{
  radius += e.deltaY*0.02;
  radius = Math.max(8, Math.min(45, radius));
  updateCam();
}, {passive:true});

let pinchStart=null;
dom.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchStart = Math.hypot(dx,dy);
  }
}, {passive:true});
dom.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinchStart){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist = Math.hypot(dx,dy);
    radius += (pinchStart-dist)*0.03;
    radius = Math.max(8, Math.min(45, radius));
    pinchStart = dist;
    updateCam();
  }
}, {passive:true});

document.querySelectorAll('#camrow button').forEach(b=>{
  b.addEventListener('click', ()=>{
    const cam = b.getAttribute('data-cam');
    if(cam==='front'){ theta=0; phi=1.15; radius=20; }
    if(cam==='side'){ theta=Math.PI/2; phi=1.15; radius=20; }
    if(cam==='top'){ theta=0.6; phi=0.15; radius=24; }
    if(cam==='iso'){ theta=Math.PI/4; phi=1.05; radius=22; }
    updateCam();
  });
});

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
loadProgress();
</script>
</body>
</html>
